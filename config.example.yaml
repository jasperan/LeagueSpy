discord:
  token: "YOUR_DISCORD_BOT_TOKEN"
  channel_id: 0  # Right-click channel -> Copy ID (enable Developer Mode in Discord settings)

oracle:
  user: "leaguespy"
  password: "leaguespy"
  dsn: "localhost:1523/FREEPDB1"

scraping:
  interval_minutes: 5
  region: "euw"  # default region, can be overridden per summoner
  live_check_minutes: 2  # how often to check for in-game status

llm:
  base_url: "http://localhost:8000/v1"  # vLLM OpenAI-compatible endpoint
  model: "qwen3.5:9b"
  max_tokens: 200

features:
  roast: true
  analytics: true
  analyst: true
  live_alerts: true
  slash_commands: true
  match_actions: true  # attach Ask/Roast/Analyze/Trends buttons to match announcements

